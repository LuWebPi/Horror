name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute base path
        id: basepath
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "base=/$REPO" >> "$GITHUB_OUTPUT"
          echo "Building with NEXT_PUBLIC_BASE_PATH=/$REPO"

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base }}
        run: bun run build

      - name: Add .nojekyll (bypass Jekyll for _next folder)
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
